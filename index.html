<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسابقة صل لتصل | مدرسة بلال بن رباح</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background-color: #fff7ed; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        .tabular-nums { font-variant-numeric: tabular-nums; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #fff7ed; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 10px; }
        
        .grid-area { touch-action: none; user-select: none; }
        .no-select { -webkit-user-select: none; user-select: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
        
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        /* حاوية اللعب الرئيسية */
        .game-main-layout {
            display: flex;
            height: calc(100vh - 70px);
            width: 100%;
            overflow: hidden;
        }

        /* تنسيق الشبكة المطور لضمان الانضباط في اليسار */
        .grid-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-color: rgba(255, 247, 237, 0.3);
            position: relative;
            overflow: hidden;
        }

        .responsive-grid-container {
            display: grid;
            gap: 1.5px; 
            background-color: #fbd38d; 
            padding: 4px;
            border-radius: 1.25rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
            border: 8px solid #f97316;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1/1;
            margin: auto;
        }

        .letter-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            background-color: white;
            border-radius: 0.15rem;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            font-size: clamp(8px, 2.8vmin, 24px);
        }
    </style>
</head>
<body class="bg-orange-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // --- إعدادات Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyA-PnMoYeVYHoGldHP-hF5Yl_E-IPcDIGs",
            authDomain: "school-contest-37c47.firebaseapp.com",
            projectId: "school-contest-37c47",
            storageBucket: "school-contest-37c47.firebasestorage.app",
            messagingSenderId: "213932298832",
            appId: "1:213932298832:web:ad1ce18a078ce7ce44b755",
            measurementId: "G-LVR7RE87JB"
        };

        let db, auth;
        try {
            if (typeof firebase !== 'undefined' && !firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
            }
        } catch (e) { console.error("Firebase Init Error", e); }

        const appId = 'school-contest-data-v1';
        const { useState, useEffect, useMemo } = React;
        const ARABIC_CHARS = "ابتثجحخدذرزسشصضطظعغفقكلمنهوي";
        const ADMIN_PASSWORD = "akm1983";
        const COMPETITION_DURATION_MS = 60 * 60 * 1000;

        const TRAINING_QUESTIONS = [
            { id: 't1', question: "عاصمة سلطنة عمان", answer: "مسقط" },
            { id: 't2', question: "العملة الرسمية في عمان", answer: "الريال" },
            { id: 't3', question: "يحد عمان من جهة الغرب", answer: "السعودية" },
            { id: 't4', question: "تقع عمان في قارة", answer: "اسيا" },
            { id: 't5', question: "نظام الحكم في عمان", answer: "سلطاني" }
        ];

        // --- دوال مساعدة عالمية ---
        const getCollection = (name) => db ? db.collection(`artifacts/${appId}/public/data/${name}`) : null;
        
        const formatTime = (ms) => {
            if (ms === null || ms < 0) return "00:00";
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        };

        const calculateGridSize = (questionList) => {
            if (!questionList || questionList.length === 0) return 12;
            const totalChars = questionList.reduce((acc, q) => acc + q.answer.replace(/\s/g, '').length, 0);
            const longestWord = Math.max(...questionList.map(q => q.answer.replace(/\s/g, '').length), 0);
            const suggestedSize = Math.ceil(Math.sqrt(totalChars * 4.2));
            let size = Math.max(12, longestWord + 1, suggestedSize);
            return Math.min(22, size); 
        };

        const createGridLogic = (questionList, size) => {
            const activeQuestions = questionList.length > 0 ? questionList : TRAINING_QUESTIONS;
            let newGrid = Array(size * size).fill({ char: '', id: '' });
            const getIndex = (x, y) => y * size + x;
            const shuffledQuestions = [...activeQuestions].sort(() => 0.5 - Math.random());
            const missing = [];
            let placedCount = 0;

            shuffledQuestions.forEach((q) => {
                let cleanAnswer = q.answer.replace(/\s/g, '');
                if (cleanAnswer.length > size) { missing.push(q.answer); return; }
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 1000) {
                    const direction = Math.floor(Math.random() * 3); 
                    const startX = Math.floor(Math.random() * size);
                    const startY = Math.floor(Math.random() * size);
                    let fits = true, indices = [];
                    for (let i = 0; i < cleanAnswer.length; i++) {
                        let x = startX, y = startY;
                        if (direction === 0) x += i;
                        else if (direction === 1) y += i;
                        else { x += i; y += i; }
                        if (x >= size || y >= size) { fits = false; break; }
                        const idx = getIndex(x, y);
                        if (newGrid[idx].char !== '') { fits = false; break; }
                        indices.push(idx);
                    }
                    if (fits) {
                        indices.forEach((idx, i) => { newGrid[idx] = { char: cleanAnswer[i], id: `cell-${idx}`, wordId: q.id }; });
                        placed = true; placedCount++;
                    }
                    attempts++;
                }
                if(!placed) missing.push(q.answer);
            });
            const finalGrid = newGrid.map((cell, idx) => {
                if (cell.char === '') return { char: ARABIC_CHARS[Math.floor(Math.random() * ARABIC_CHARS.length)], id: `rand-${idx}`, isRandom: true };
                return cell;
            });
            return { grid: finalGrid, missing, placedCount };
        };

        // --- المكونات الفرعية ---

        const LoadingScreen = () => (
            <div className="flex flex-col items-center justify-center h-screen bg-orange-50 animate-fadeIn">
                <div className="w-16 h-16 border-4 border-orange-600 border-t-transparent rounded-full animate-spin mb-4 shadow-lg"></div>
                <p className="text-orange-800 font-bold text-xl font-black">جاري تحضير المسابقة...</p>
            </div>
        );

        const WelcomeScreen = ({ setGameState, setShowPasswordModal }) => (
            <div className="flex flex-col items-center justify-center h-full text-center p-4 animate-fadeIn relative min-h-screen">
                <div className="bg-white/90 p-10 rounded-[3rem] shadow-2xl max-w-2xl w-full border-4 border-orange-500 relative z-10">
                    <i className="fas fa-school text-7xl text-orange-600 mb-6 block"></i>
                    <h1 className="text-4xl md:text-5xl font-black text-orange-700 mb-2 text-center">مسابقة صِل لتصل</h1>
                    <h3 className="text-xl text-gray-600 mb-10 text-center font-bold">مدرسة بلال بن رباح - الدراسات الاجتماعية</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
                        <button onClick={() => setGameState('select_school')} className="bg-orange-600 text-white p-6 rounded-3xl text-xl font-bold hover:bg-orange-700 transition shadow-lg transform hover:scale-105 active:scale-95">
                            <i className="fas fa-user-graduate text-3xl mb-2"></i><br/>دخول المدارس
                        </button>
                        <button onClick={() => setShowPasswordModal(true)} className="bg-white text-orange-800 border-2 border-orange-200 p-6 rounded-3xl text-xl font-bold hover:bg-orange-50 transition shadow-lg transform hover:scale-105 active:scale-95">
                            <i className="fas fa-user-shield text-3xl mb-2"></i><br/>لوحة التحكم
                        </button>
                    </div>
                </div>
            </div>
        );

        const SelectSchoolScreen = ({ schools, gameConfig, handleStartPlaying, setGameState }) => {
            const [enteredCode, setEnteredCode] = useState('');
            const [error, setError] = useState(false);
            const handleLogin = (e) => {
                e.preventDefault();
                if (enteredCode === 'test') { handleStartPlaying('training-mode', true); return; }
                if (gameConfig.isLocked) { alert("المسابقة مغلقة حالياً."); return; }
                if (!schools || schools.length === 0) { alert("جاري تحميل البيانات..."); return; }
                const foundSchool = schools.find(s => s.password === enteredCode);
                if (foundSchool) handleStartPlaying(foundSchool.id, false);
                else setError(true);
            };

            return (
                <div className="flex flex-col items-center justify-center h-full p-4 min-h-screen animate-fadeIn">
                    <div className="w-full max-w-md bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-orange-200 relative z-10">
                        <button onClick={() => setGameState('welcome')} className="mb-6 text-orange-600 flex items-center gap-2 font-bold hover:underline transition"><i className="fas fa-arrow-right"></i> عودة</button>
                        <h2 className="text-3xl font-black text-center text-gray-800 mb-8">تسجيل الدخول</h2>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <input type="password" autoFocus value={enteredCode} onChange={(e) => {setEnteredCode(e.target.value); setError(false);}} placeholder="الرمز السري" className="w-full p-4 border-2 border-gray-100 rounded-2xl text-center text-2xl tracking-widest focus:ring-4 focus:ring-orange-100 focus:border-orange-500 outline-none transition-all placeholder:text-gray-300" />
                            {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl flex items-center justify-center gap-2 font-bold animate-shake"><i className="fas fa-exclamation-triangle"></i><span>الرمز غير صحيح</span></div>}
                            <button type="submit" className="w-full bg-orange-600 text-white py-4 rounded-xl text-xl font-bold hover:bg-orange-700 transition shadow-lg transform active:scale-95">دخول</button>
                        </form>
                    </div>
                </div>
            );
        };

        const AdminScreen = ({ questions, schools, gameConfig, timeLeft, setGameState, initialTab = 'dashboard', ...actions }) => {
            const [adminTab, setAdminTab] = useState(initialTab);
            const [importModal, setImportModal] = useState(false);
            const [textQ, setTextQ] = useState('');
            const [textA, setTextA] = useState('');
            const [newS, setNewS] = useState({ name: '', pass: '', type: 'boys' });

            // لضمان تحديث التبويب عند تغير initialTab من الخارج
            useEffect(() => {
                setAdminTab(initialTab);
            }, [initialTab]);

            const sorted = useMemo(() => [...schools].sort((a, b) => b.score - a.score), [schools]);
            
            // إصلاح منطق التصفية: أي مدرسة ليست إناث تعتبر ذكور
            const girls = useMemo(() => sorted.filter(s => s.type === 'girls'), [sorted]);
            const boys = useMemo(() => sorted.filter(s => s.type !== 'girls'), [sorted]);

            // منطق معاينة الشبكة
            const [previewGrid, setPreviewGrid] = useState(null);
            const [missingWords, setMissingWords] = useState([]);
            const [previewGridSize, setPreviewGridSize] = useState(12);

            const handleVerifyGrid = () => {
                const newSize = calculateGridSize(questions);
                setPreviewGridSize(newSize);
                const result = createGridLogic(questions, newSize);
                setPreviewGrid(result.grid);
                setMissingWords(result.missing);
            };

            const handleDeleteMissingQuestions = async () => {
                if (!window.confirm(`حذف ${missingWords.length} أسئلة؟`)) return;
                const questionsToDelete = questions.filter(q => missingWords.includes(q.answer));
                const batch = db.batch();
                questionsToDelete.forEach(q => batch.delete(getCollection('questions').doc(q.id)));
                try { await batch.commit(); alert("تم الحذف."); setMissingWords([]); setPreviewGrid(null); } catch (e) { alert(e.message); }
            };

            const handleImport = async () => {
                const qs = textQ.trim().split('\n');
                const as = textA.trim().split('\n');
                if(qs.length !== as.length) return alert("عدد الأسئلة لا يطابق الأجوبة");
                const batch = db.batch();
                qs.forEach((q, i) => {
                    if(q && as[i]) batch.set(getCollection('questions').doc(), { question: q.trim(), answer: as[i].trim(), createdAt: Date.now() });
                });
                await batch.commit();
                alert("تم الاستيراد بنجاح");
                setImportModal(false); setTextQ(''); setTextA('');
            };

            return (
                <div className="h-screen flex flex-col bg-orange-50 overflow-hidden animate-fadeIn">
                    <div className="bg-white p-4 shadow-sm border-b-2 border-orange-200 flex justify-between items-center z-10">
                        <div className="flex gap-4 items-center">
                            <h2 className="font-black text-2xl text-orange-800">لوحة الإدارة</h2>
                            <div className="bg-gray-800 text-white px-4 py-1 rounded-lg font-mono tabular-nums text-xl">{formatTime(timeLeft)}</div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setAdminTab('dashboard')} className={`px-4 py-2 rounded-lg font-bold transition ${adminTab==='dashboard'?'bg-orange-600 text-white shadow-md':'bg-gray-100 hover:bg-gray-200'}`}>التحكم</button>
                            <button onClick={() => setAdminTab('results')} className={`px-4 py-2 rounded-lg font-bold transition ${adminTab==='results'?'bg-orange-600 text-white shadow-md':'bg-gray-100 hover:bg-gray-200'}`}>النتائج المباشرة</button>
                            <button onClick={() => setAdminTab('questions')} className={`px-4 py-2 rounded-lg font-bold transition ${adminTab==='questions'?'bg-orange-600 text-white shadow-md':'bg-gray-100 hover:bg-gray-200'}`}>الأسئلة</button>
                            <button onClick={() => setAdminTab('schools')} className={`px-4 py-2 rounded-lg font-bold transition ${adminTab==='schools'?'bg-orange-600 text-white shadow-md':'bg-gray-100 hover:bg-gray-200'}`}>المدارس</button>
                            <button onClick={() => setAdminTab('preview')} className={`px-4 py-2 rounded-lg font-bold transition ${adminTab==='preview'?'bg-orange-600 text-white shadow-md':'bg-gray-100 hover:bg-gray-200'}`}>فحص الشبكة</button>
                            <button onClick={() => setGameState('welcome')} className="px-4 py-2 bg-red-100 text-red-700 rounded-lg font-bold transition active:scale-95">خروج</button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 custom-scrollbar">
                        {adminTab === 'dashboard' && (
                            <div className="flex flex-col items-center justify-center h-full gap-8">
                                <h1 className="text-4xl font-black text-orange-800">{gameConfig.isLocked ? "المسابقة موقوفة" : "المسابقة جارية الآن"}</h1>
                                <div className="flex gap-6">
                                    <button onClick={actions.startGame} className="bg-green-600 text-white px-12 py-6 rounded-3xl font-bold text-2xl shadow-xl hover:bg-green-700 transition transform hover:scale-105">بدء المسابقة</button>
                                    <button onClick={actions.resetGameStatus} className="bg-red-600 text-white px-12 py-6 rounded-3xl font-bold text-2xl shadow-xl hover:bg-red-700 transition transform hover:scale-105">إيقاف المسابقة</button>
                                </div>
                                <button onClick={actions.createNewCompetition} className="text-red-500 underline font-bold hover:text-red-700 transition">إنشاء مسابقة جديدة (تصفير شامل)</button>
                            </div>
                        )}

                        {adminTab === 'results' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 h-full overflow-hidden">
                                <div className="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col border-t-8 border-blue-500">
                                    <div className="p-4 bg-blue-50 text-center font-black text-2xl text-blue-800 border-b">مدارس الذكور</div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                        {boys.length === 0 && <p className="text-center text-gray-400 py-10 italic">لا توجد نتائج مسجلة للذكور</p>}
                                        {boys.map((s, i) => (
                                            <div key={s.id} className="flex justify-between items-center p-4 border-2 border-blue-50 rounded-2xl shadow-sm hover:border-blue-100 transition">
                                                <div className="flex items-center gap-3"><span className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">{i+1}</span><span className="font-bold text-lg">{s.name}</span></div>
                                                <span className="text-3xl font-black text-blue-600">{s.score}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col border-t-8 border-pink-500">
                                    <div className="p-4 bg-pink-50 text-center font-black text-2xl text-pink-800 border-b">مدارس الإناث</div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                        {girls.length === 0 && <p className="text-center text-gray-400 py-10 italic">لا توجد نتائج مسجلة للإناث</p>}
                                        {girls.map((s, i) => (
                                            <div key={s.id} className="flex justify-between items-center p-4 border-2 border-pink-50 rounded-2xl shadow-sm hover:border-pink-100 transition">
                                                <div className="flex items-center gap-3"><span className="w-8 h-8 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center font-bold">{i+1}</span><span className="font-bold text-lg">{s.name}</span></div>
                                                <span className="text-3xl font-black text-pink-600">{s.score}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {adminTab === 'questions' && (
                            <div className="bg-white p-8 rounded-3xl shadow-xl h-full flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-2xl text-gray-800">بنك الأسئلة ({questions.length})</h3>
                                    <button onClick={() => setImportModal(true)} className="bg-green-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-green-700 transition shadow-md flex items-center gap-2"><i className="fas fa-file-excel"></i> استيراد</button>
                                </div>
                                <div className="flex-1 overflow-y-auto custom-scrollbar border rounded-2xl">
                                    {questions.map((q, i) => (
                                        <div key={q.id} className="p-4 border-b flex justify-between items-center hover:bg-gray-50 transition group">
                                            <span className="text-lg"><b>{i+1}.</b> {q.question} <span className="text-green-600 font-bold">({q.answer})</span></span>
                                            <button onClick={() => actions.deleteQuestionFromDB(q.id)} className="text-red-300 hover:text-red-600 p-2 transition"><i className="fas fa-trash"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {adminTab === 'schools' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 h-full">
                                <div className="bg-white p-8 rounded-3xl shadow-xl border-2 border-gray-50 flex flex-col">
                                    <h3 className="font-black text-xl mb-6 border-b pb-4 text-orange-800">تسجيل مدرسة</h3>
                                    <div className="space-y-5">
                                        <input type="text" placeholder="اسم المدرسة" value={newS.name} onChange={e=>setNewS({...newS, name: e.target.value})} className="w-full p-3 border-2 border-gray-100 rounded-xl outline-none" />
                                        <input type="text" placeholder="كلمة المرور" value={newS.pass} onChange={e=>setNewS({...newS, pass: e.target.value})} className="w-full p-3 border-2 border-gray-100 rounded-xl outline-none" />
                                        <select value={newS.type} onChange={e=>setNewS({...newS, type: e.target.value})} className="w-full p-3 border-2 border-gray-100 rounded-xl outline-none bg-white font-bold">
                                            <option value="boys">ذكور</option>
                                            <option value="girls">إناث</option>
                                        </select>
                                        <button onClick={() => { actions.addSchoolToDB(newS.name, newS.pass, newS.type); setNewS({name:'', pass:'', type:'boys'}); }} className="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-orange-700 transition shadow-md">حفظ المدرسة</button>
                                    </div>
                                </div>
                                <div className="md:col-span-2 bg-white p-8 rounded-3xl shadow-xl border-2 border-gray-50 flex flex-col">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-black text-xl text-gray-800">المدارس المسجلة ({schools.length})</h3>
                                        <button onClick={actions.deleteAllSchoolsFromDB} className="text-red-500 text-sm font-bold">حذف الكل</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar border rounded-2xl">
                                        {schools.map(s => (
                                            <div key={s.id} className="p-4 border-b last:border-0 flex justify-between items-center hover:bg-gray-50">
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-lg">{s.name} <span className={`text-xs px-2 py-0.5 rounded-full mr-2 ${s.type==='girls'?'bg-pink-100 text-pink-700':'bg-blue-100 text-blue-700'}`}>{s.type === 'girls' ? 'إناث' : 'ذكور'}</span></span>
                                                    <span className="text-sm text-gray-400 font-bold">كلمة السر: {s.password}</span>
                                                </div>
                                                <button onClick={() => actions.deleteSchoolFromDB(s.id)} className="text-red-200 hover:text-red-500 p-2 transition"><i className="fas fa-trash"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {adminTab === 'preview' && (
                            <div className="flex flex-col h-full bg-white p-8 rounded-3xl shadow-xl overflow-hidden">
                                <div className="flex justify-between items-center mb-6 border-b pb-4">
                                    <div className="flex flex-col">
                                        <h3 className="font-black text-2xl text-orange-800">معاينة وتوليد الشبكة</h3>
                                        <span className="text-xs text-gray-400">حجم الشبكة المقترح بناءً على الأسئلة: {previewGridSize}×{previewGridSize}</span>
                                    </div>
                                    <button onClick={handleVerifyGrid} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg flex items-center gap-2"><i className="fas fa-random"></i> تجربة التوليد (خلط الكلمات)</button>
                                </div>
                                <div className="flex flex-col lg:flex-row gap-8 h-full overflow-hidden">
                                    <div className="lg:w-1/3 space-y-4">
                                        <div className="bg-orange-50 p-6 rounded-2xl border-2 border-orange-100">
                                            <h4 className="font-bold text-orange-800 mb-4 border-b border-orange-200 pb-2 flex items-center gap-2"><i className="fas fa-info-circle"></i> تقرير الاستيعاب</h4>
                                            <div className="space-y-3">
                                                <p className="flex justify-between"><span>إجمالي الأسئلة في البنك:</span><b>{questions.length}</b></p>
                                                {previewGrid && (
                                                    <>
                                                        <p className="flex justify-between"><span>تمكن النظام من وضع:</span><b className="text-green-600">{questions.length - missingWords.length}</b></p>
                                                        <p className="flex justify-between"><span>كلمات لم تجد مكاناً:</span><b className={missingWords.length > 0 ? "text-red-600 text-xl" : "text-gray-600"}>{missingWords.length}</b></p>
                                                        {missingWords.length > 0 && (
                                                            <div className="mt-4 p-4 bg-red-50 rounded-xl border border-red-100">
                                                                <p className="text-xs text-red-700 font-bold mb-2">الكلمات المرفوضة (طويلة جداً أو تداخلت):</p>
                                                                <ul className="text-xs list-disc list-inside mb-4 max-h-32 overflow-y-auto">{missingWords.map((w,i)=><li key={i}>{w}</li>)}</ul>
                                                                <button onClick={handleDeleteMissingQuestions} className="w-full bg-red-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-red-700 transition shadow-sm">حذف الأسئلة المرفوضة من البنك</button>
                                                            </div>
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="lg:w-2/3 flex items-center justify-center bg-gray-50 rounded-3xl p-4 border-2 border-dashed border-gray-200 overflow-hidden relative">
                                        {previewGrid ? (
                                            <div className="grid gap-px bg-orange-200 p-1 rounded-xl shadow-lg border-4 border-orange-400" 
                                                 style={{ 
                                                    gridTemplateColumns: `repeat(${previewGridSize}, 1fr)`,
                                                    width: 'min(100%, 480px)',
                                                    aspectRatio: '1/1'
                                                 }}>
                                                {previewGrid.map((cell, i) => (
                                                    <div key={i} className={`flex items-center justify-center bg-white font-black text-[clamp(4px,1.2vw,12px)] rounded-sm ${cell.char && !cell.isRandom ? 'text-indigo-600 bg-indigo-50' : 'text-gray-300'}`}>
                                                        {cell.char}
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center gap-4 text-gray-300">
                                                <i className="fas fa-th text-8xl opacity-10"></i>
                                                <p className="font-bold italic">اضغط "تجربة التوليد" لفحص استيعاب الكلمات</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {importModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-4xl p-8 rounded-[2rem] shadow-2xl flex flex-col gap-6 animate-scaleIn">
                                <h3 className="text-2xl font-black">استيراد الأسئلة والأجوبة من Excel</h3>
                                <div className="grid grid-cols-2 gap-6 flex-1 min-h-[300px]">
                                    <div className="flex flex-col"><label className="font-bold text-sm mb-2 text-orange-600">قائمة الأسئلة</label><textarea value={textQ} onChange={e=>setTextQ(e.target.value)} className="flex-1 p-4 border rounded-2xl bg-gray-50 resize-none font-mono text-sm focus:border-orange-500 outline-none" placeholder="انسخ عمود الأسئلة هنا..."></textarea></div>
                                    <div className="flex flex-col"><label className="font-bold text-sm mb-2 text-green-600">قائمة الأجوبة</label><textarea value={textA} onChange={e=>setTextA(e.target.value)} className="flex-1 p-4 border rounded-2xl bg-gray-50 resize-none font-mono text-sm focus:border-green-500 outline-none" placeholder="انسخ عمود الأجوبة هنا..."></textarea></div>
                                </div>
                                <div className="flex gap-4 pt-4">
                                    <button onClick={handleImport} className="flex-[2] bg-orange-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-orange-700 transition shadow-lg active:scale-95">بدء الاستيراد</button>
                                    <button onClick={() => setImportModal(false)} className="flex-1 bg-gray-200 text-gray-600 py-4 rounded-2xl font-bold text-lg">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ResultScreen = ({ schools, currentSchoolId, score, setGameState, isPracticeMode }) => {
            const currentSchool = schools.find(s => s.id === currentSchoolId);
            return (
                <div className="flex flex-col items-center justify-center h-full text-center p-4 animate-fadeIn min-h-screen bg-white">
                    <div className="bg-white p-12 rounded-[3rem] shadow-2xl border-4 border-yellow-400 max-w-lg w-full transform scale-110">
                        <i className="fas fa-trophy w-24 h-24 text-yellow-500 mx-auto mb-6 animate-bounce text-7xl drop-shadow-lg"></i>
                        <h2 className="text-5xl font-black text-gray-800 mb-4">أحسنت يا بطل!</h2>
                        <h3 className="text-2xl text-orange-600 font-bold mb-8 bg-orange-50 py-3 rounded-2xl px-6 inline-block">
                            {isPracticeMode ? "انتهى التدريب التجريبي" : (currentSchool?.name || "انتهت المسابقة")}
                        </h3>
                        <div className="text-8xl font-black text-orange-600 mb-10 tabular-nums">{score} <span className="text-2xl text-gray-400 font-medium">نقطة</span></div>
                        <button onClick={() => setGameState('welcome')} className="bg-gray-800 text-white px-10 py-5 rounded-2xl font-bold hover:bg-gray-900 transition w-full flex justify-center items-center gap-3 text-xl shadow-xl active:scale-95"><i className="fas fa-home"></i> العودة للرئيسية</button>
                    </div>
                </div>
            );
        };

        // --- المكون الرئيسي ---
        function App() {
            const [user, setUser] = useState(null);
            const [gameState, setGameState] = useState('loading'); 
            const [questions, setQuestions] = useState([]);
            const [schools, setSchools] = useState([]);
            const [gameConfig, setGameConfig] = useState({ isLocked: true, startTime: null });
            const [currentSchoolId, setCurrentSchoolId] = useState(null);
            const [grid, setGrid] = useState([]);
            const [gridSize, setGridSize] = useState(12);
            const [solvedQuestions, setSolvedQuestions] = useState([]);
            const [solvedCells, setSolvedCells] = useState([]);
            const [selection, setSelection] = useState({ start: null, current: null, active: false });
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(null);
            const [showPasswordModal, setShowPasswordModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [showExitConfirm, setShowExitConfirm] = useState(false);
            const [isPracticeMode, setIsPracticeMode] = useState(false);

            useEffect(() => {
                if (!auth) return;
                const unsub = auth.onAuthStateChanged((u) => {
                    if (u) { setUser(u); if (gameState === 'loading') setGameState('welcome'); } 
                    else { auth.signInAnonymously().catch(e => console.error(e)); }
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!db || !user) return; 
                const basePath = `artifacts/${appId}/public/data`;
                const unsubConfig = db.collection(basePath + '/game_config').doc('main').onSnapshot(doc => { 
                    if (doc.exists) setGameConfig(doc.data()); 
                    else db.collection(basePath + '/game_config').doc('main').set({ isLocked: true, startTime: null }); 
                });
                const unsubQ = db.collection(basePath + '/questions').onSnapshot(s => { 
                    setQuestions(s.docs.map(d => ({id:d.id, ...d.data()}))); 
                });
                const unsubS = db.collection(basePath + '/schools').onSnapshot(s => setSchools(s.docs.map(d => ({id:d.id, ...d.data()}))));
                return () => { unsubQ(); unsubS(); unsubConfig(); };
            }, [user]);

            useEffect(() => {
                if (gameConfig.startTime) {
                    const timer = setInterval(() => {
                        const rem = Math.max(0, COMPETITION_DURATION_MS - (Date.now() - gameConfig.startTime));
                        setTimeLeft(rem);
                        if (rem === 0 && !isPracticeMode && gameState === 'playing') setGameState('result');
                    }, 1000);
                    return () => clearInterval(timer);
                } else setTimeLeft(null);
            }, [gameConfig.startTime, gameState, isPracticeMode]);

            const startGame = () => db.collection(`artifacts/${appId}/public/data/game_config`).doc('main').update({ isLocked: false, startTime: Date.now() });
            const resetGameStatus = () => db.collection(`artifacts/${appId}/public/data/game_config`).doc('main').update({ isLocked: true, startTime: null });
            const deleteQuestionFromDB = (id) => getCollection('questions').doc(id).delete();
            const deleteAllQuestionsFromDB = async () => { if(confirm("حذف كل الأسئلة؟")){ const b=db.batch(); questions.forEach(q=>b.delete(getCollection('questions').doc(q.id))); await b.commit(); } };
            const addSchoolToDB = (n, p, t) => getCollection('schools').add({ name: n, password: p, type: t, score: 0, solvedCount: 0, completed: false });
            const deleteSchoolFromDB = (id) => getCollection('schools').doc(id).delete();
            const resetAllSchools = () => schools.forEach(s => getCollection('schools').doc(s.id).update({ score: 0, solvedCount: 0, completed: false }));
            const deleteAllSchoolsFromDB = async () => { if(confirm("حذف كل المدارس؟")){ const b=db.batch(); schools.forEach(s=>b.delete(getCollection('schools').doc(s.id))); await b.commit(); } };
            const createNewCompetition = async () => { if(confirm("تصفير شامل؟ سيتم مسح كل شيء للبدء من جديد.")){ const b=db.batch(); questions.forEach(q=>b.delete(getCollection('questions').doc(q.id))); schools.forEach(s=>b.delete(getCollection('schools').doc(s.id))); b.update(db.collection(`artifacts/${appId}/public/data/game_config`).doc('main'), { isLocked: true, startTime: null }); await b.commit(); } };

            const handleStartPlaying = (sId, practice = false) => {
                setCurrentSchoolId(sId);
                setIsPracticeMode(practice);
                setGameState('playing');
                const activeQs = practice ? TRAINING_QUESTIONS : questions;
                const size = calculateGridSize(activeQs);
                setGridSize(size);
                const res = createGridLogic(activeQs, size);
                setGrid(res.grid);
                setSolvedQuestions([]); setSolvedCells([]); setScore(0); setSelection({start:null, current:null, active:false});
            };

            const getLineIndices = (start, end) => {
                const sx=start%gridSize, sy=Math.floor(start/gridSize), ex=end%gridSize, ey=Math.floor(end/gridSize), dx=ex-sx, dy=ey-sy, steps=Math.max(Math.abs(dx),Math.abs(dy));
                if(steps===0) return [start];
                if(sx!==ex && sy!==ey && Math.abs(dx)!==Math.abs(dy)) return [];
                const arr=[]; for(let i=0; i<=steps; i++) arr.push(Math.round(sy+dy/steps*i)*gridSize+Math.round(sx+dx/steps*i));
                return arr;
            };

            const handleMouseDown = (idx) => setSelection({start:idx, current:idx, active:true});
            const handleMouseEnter = (idx) => selection.active && setSelection(p=>({...p, current:idx}));
            const handleMouseUp = () => {
                if(!selection.active) return;
                const indices = getLineIndices(selection.start, selection.current);
                const word = indices.map(i=>grid[i].char).join('');
                const rev = word.split('').reverse().join('');
                const activeQs = isPracticeMode ? TRAINING_QUESTIONS : questions;
                const q = activeQs.find(q=>{ const a=q.answer.replace(/\s/g,''); return (a===word||a===rev) && !solvedQuestions.includes(q.id) });
                if(q){
                    const newScore = score + 10;
                    setScore(newScore);
                    const newSolved = [...solvedQuestions, q.id];
                    setSolvedQuestions(newSolved);
                    setSolvedCells(p=>[...p, ...indices]);
                    if(!isPracticeMode && currentSchoolId) {
                        getCollection('schools').doc(currentSchoolId).update({
                            score: newScore, 
                            solvedCount: newSolved.length, 
                            completed: newSolved.length === (questions.length || 1)
                        });
                    }
                    if(newSolved.length === activeQs.length) setTimeout(()=>setGameState('result'), 1500);
                }
                setSelection({start:null, current:null, active:false});
            };

            if (gameState === 'loading') return <LoadingScreen />;

            return (
                <div dir="rtl" className="h-screen flex flex-col overflow-hidden bg-orange-50 no-select">
                    
                    {gameState === 'welcome' && <WelcomeScreen setGameState={setGameState} setShowPasswordModal={setShowPasswordModal} />}
                    {gameState === 'select_school' && <SelectSchoolScreen schools={schools} gameConfig={gameConfig} handleStartPlaying={handleStartPlaying} setGameState={setGameState} />}
                    {(gameState === 'admin' || gameState === 'leaderboard' || gameState === 'preview') && <AdminScreen questions={questions} schools={schools} gameConfig={gameConfig} timeLeft={timeLeft} setGameState={setGameState} initialTab={gameState === 'leaderboard' ? 'results' : gameState === 'preview' ? 'preview' : 'dashboard'} startGame={startGame} resetGameStatus={resetGameStatus} deleteQuestionFromDB={deleteQuestionFromDB} deleteAllQuestionsFromDB={deleteAllQuestionsFromDB} addSchoolToDB={addSchoolToDB} deleteSchoolFromDB={deleteSchoolFromDB} resetAllSchools={resetAllSchools} deleteAllSchoolsFromDB={deleteAllSchoolsFromDB} createNewCompetition={createNewCompetition} />}
                    {gameState === 'result' && <ResultScreen schools={schools} currentSchoolId={currentSchoolId} score={score} setGameState={setGameState} isPracticeMode={isPracticeMode} />}

                    {gameState === 'playing' && (
                        <div className="h-full flex flex-col overflow-hidden" onMouseUp={handleMouseUp} onTouchEnd={handleMouseUp}>
                            <header className={`p-4 text-white flex justify-between items-center shadow-2xl h-[70px] z-20 ${isPracticeMode ? 'bg-indigo-600 border-b-4 border-indigo-800':'bg-orange-600 border-b-4 border-orange-800'}`}>
                                <div className="flex items-center gap-4">
                                    <button onClick={(e)=>{ e.stopPropagation(); setShowExitConfirm(true); }} className="w-10 h-10 bg-black/20 rounded-xl flex items-center justify-center active:scale-90 transition shadow-inner"><i className="fas fa-home text-lg"></i></button>
                                    <div className="flex flex-col">
                                        <span className="font-black text-xl leading-tight truncate max-w-[200px]">{isPracticeMode ? "وضع التدريب": schools.find(s=>s.id===currentSchoolId)?.name}</span>
                                    </div>
                                </div>
                                <div className="flex gap-6 items-center">
                                    {!isPracticeMode && <div className="bg-black/20 px-5 py-1.5 rounded-2xl tabular-nums font-black text-2xl shadow-inner border border-white/10">{formatTime(timeLeft)}</div>}
                                    <div className="bg-white text-orange-800 px-6 py-1.5 rounded-2xl font-black text-xl shadow-lg border-2 border-orange-100">النقاط: {score}</div>
                                </div>
                            </header>
                            
                            <main className="game-main-layout">
                                <div className="w-full md:w-1/3 bg-white border-l-4 border-orange-100 p-6 overflow-y-auto custom-scrollbar shadow-2xl z-10">
                                    <h3 className="font-black text-orange-800 mb-6 border-b-2 border-orange-50 pb-3 flex items-center gap-3 text-2xl"><i className="fas fa-tasks text-orange-400"></i> الأسئلة المتاحة</h3>
                                    <div className="space-y-4 pb-20">
                                        {(isPracticeMode ? TRAINING_QUESTIONS : questions).map((q, i) => (
                                            <div key={q.id} className={`p-5 rounded-[1.5rem] border-2 transition-all duration-300 ${solvedQuestions.includes(q.id)?'bg-green-50 border-green-200 opacity-60 shadow-none':'bg-white border-orange-50 shadow-md hover:border-orange-200'}`}>
                                                <p className={`text-base md:text-lg font-bold leading-relaxed ${solvedQuestions.includes(q.id)?'line-through text-green-700':'text-gray-700'}`}>
                                                    <span className="text-orange-400 ml-2 font-black">#{i+1}</span> {q.question}
                                                </p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="grid-zone">
                                    <div className="responsive-grid-container" 
                                         style={{ gridTemplateColumns: `repeat(${gridSize}, 1fr)` }}>
                                        {grid.map((cell, idx) => {
                                            const sel = selection.active && getLineIndices(selection.start, selection.current).includes(idx);
                                            const solved = solvedCells.includes(idx);
                                            return (
                                                <div key={idx} 
                                                     onMouseDown={()=>handleMouseDown(idx)} onMouseEnter={()=>handleMouseEnter(idx)}
                                                     onTouchStart={(e)=>{e.preventDefault(); handleMouseDown(idx);}}
                                                     onTouchMove={(e)=>{
                                                         e.preventDefault(); 
                                                         const touch = e.touches[0];
                                                         const el = document.elementFromPoint(touch.clientX, touch.clientY);
                                                         if (el && el.dataset.idx) handleMouseEnter(parseInt(el.dataset.idx));
                                                     }}
                                                     data-idx={idx} 
                                                     className={`letter-cell ${sel ? 'bg-orange-600 text-white scale-110 z-10 shadow-xl ring-1 ring-white' : solved ? 'bg-green-500 text-white shadow-inner opacity-90 scale-95' : 'hover:bg-orange-50 text-gray-800 border-[0.5px] border-orange-100'}`}>
                                                    {cell.char}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </main>
                        </div>
                    )}

                    {showPasswordModal && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-xs animate-scaleIn border-b-8 border-orange-500">
                                <h3 className="font-black text-2xl mb-6 text-center text-gray-800">دخول الإدارة</h3>
                                <input 
                                    type="password" 
                                    value={passwordInput} 
                                    onChange={(e) => {setPasswordInput(e.target.value); loginError && setLoginError(false);}} 
                                    autoFocus 
                                    placeholder="كلمة المرور" 
                                    onKeyDown={(e)=>{if(e.key==='Enter'){
                                        if(passwordInput === ADMIN_PASSWORD) {setGameState('admin'); setShowPasswordModal(false); setPasswordInput('');} 
                                        else setLoginError(true);
                                    }}} 
                                    className={`w-full p-4 border-2 rounded-2xl text-center mb-2 focus:border-orange-400 outline-none text-xl transition-all ${loginError ? 'border-red-500 animate-shake' : 'border-gray-100'}`} 
                                />
                                {loginError && <p className="text-red-500 text-xs text-center mb-4 font-bold">كلمة المرور غير صحيحة!</p>}
                                <div className="flex flex-col gap-2 mt-4">
                                    <button onClick={() => { if(passwordInput === ADMIN_PASSWORD) { setGameState('admin'); setShowPasswordModal(false); setPasswordInput(''); } else setLoginError(true); }} className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700 transition active:scale-95 shadow-lg">دخول</button>
                                    <button onClick={() => {setShowPasswordModal(false); setPasswordInput(''); setLoginError(false);}} className="w-full text-gray-400 font-bold hover:text-gray-600">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showExitConfirm && (
                        <div className="fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-4 animate-fadeIn backdrop-blur-md">
                            <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-sm w-full text-center border-t-8 border-red-500 animate-scaleIn">
                                <i className="fas fa-exclamation-circle text-red-500 text-6xl mb-6"></i>
                                <h3 className="text-2xl font-black text-gray-800 mb-2 text-center">تنبيه بالخروج</h3>
                                <p className="text-gray-500 mb-8 font-medium">هل أنت متأكد من العودة للرئيسية؟ سيتم فقدان تقدمك الحالي.</p>
                                <div className="flex gap-4">
                                    <button onClick={()=>{ setGameState('welcome'); setShowExitConfirm(false); }} className="flex-1 bg-red-600 text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition shadow-lg">خروج</button>
                                    <button onClick={()=>setShowExitConfirm(false)} className="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold text-lg active:scale-95 transition">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {gameState !== 'playing' && <footer className="fixed bottom-0 w-full bg-white/60 backdrop-blur-sm p-1.5 text-center text-xs text-gray-400 font-bold z-0 border-t border-orange-100">تصميم المسابقة: أ. عبدالله بن خلف الرواحي</footer>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
